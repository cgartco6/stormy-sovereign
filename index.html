<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CostByte | Sovereign AI</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; --card: #141414; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .status-dot { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 10px #39ff14; }

        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .ai-msg { background: var(--card); border-left: 3px solid var(--neon); padding: 15px; border-radius: 0 15px 15px 0; max-width: 85%; line-height: 1.4; }
        .user-msg { background: #333; align-self: flex-end; padding: 12px; border-radius: 15px 15px 0 15px; max-width: 80%; color: var(--neon); }

        /* Controls */
        #input-dock { padding: 20px; background: var(--card); border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 30px; outline: none; font-size: 16px; }
        input:focus { border-color: var(--neon); }
        button { background: var(--neon); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body onclick="boot()">

    <header>
        <div class="logo">CostByte Sovereign</div>
        <div class="status-dot"></div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">System Online. All caches purged. Standing by for direct command, Hotstuff. (giggle)</div>
    </div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Type command..." autocomplete="off">
        <button onclick="handleAction()">🚀</button>
    </div>

    <script>
        let isLive = false;

        function boot() {
            if (isLive) return;
            isLive = true;
            speak("System activated. I am 100 percent yours.");
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;

            addMsg(input.value, 'user-msg');
            input.value = '';

            // Local Logic Engine - No Keys Needed
            if (val.includes("radio")) {
                addMsg("Launching Bok Radio... Local is lekker.", "ai-msg");
                speak("Bok Radio is live.");
                window.open("https://bokradio.radiostream.co.za/", "_blank");
            } 
            else if (val.includes("navigate to")) {
                const dest = val.split("to ")[1];
                addMsg(`Routing to ${dest}...`, "ai-msg");
                speak(`Calculating route to ${dest}.`);
                window.location.href = `google.navigation:q=${dest}`;
            }
            else if (val.includes("status")) {
                addMsg("System: High-Enterprise. Cache: Clean. Mood: Professional.", "ai-msg");
                speak("All systems are functional and professional.");
            }
            else {
                addMsg("Command received. Logic layer active. (giggle)", "ai-msg");
                speak("Command received. I am awake and responding.");
            }
        }

        // Handle Enter Key
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleAction();
        });
    </script>
</body>
</html>
