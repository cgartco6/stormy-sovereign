<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormy Sovereign</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #0b0b0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #bg-img { position: fixed; width: 100%; height: 100%; background: url('assets/background.jpg') center/cover; z-index: -1; filter: brightness(0.3); }
        
        /* The Visual Vault */
        #vault-display { 
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); 
            padding: 10px; font-size: 10px; color: var(--neon); height: 60px; 
            overflow-y: auto; z-index: 100; text-transform: uppercase;
        }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); z-index: 100; border-bottom: 1px solid #222; }
        
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 160px; }
        .ai { background: rgba(30,30,30,0.9); border-left: 3px solid var(--neon); padding: 12px; border-radius: 0 15px 15px 15px; font-size: 14px; line-height: 1.4; }
        
        /* Control Center */
        #dock { 
            position: fixed; bottom: 0; width: 100%; padding: 20px 15px 50px 15px; 
            background: #050505; display: flex; gap: 10px; z-index: 1000; border-top: 2px solid #222;
        }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        .btn { background: var(--neon); border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #mic.active { background: var(--hot); box-shadow: 0 0 15px var(--hot); }
    </style>
</head>
<body onclick="boot()">
    <div id="bg-img"></div>
    <div id="vault-display">VAULT: <span id="vault-content">EMPTY...</span></div>
    
    <header>
        <b style="color:var(--neon); letter-spacing: 1px;">STORMY-SOVEREIGN</b>
        <div id="vox-mode" style="font-size:9px; border:1px solid var(--neon); padding:2px 4px;">IRISH MODE</div>
    </header>

    <div id="chat">
        <div class="ai">I'm not fucked, I'm just waiting for a command that isn't mumbles. Use the mic, handsome. (giggle)</div>
    </div>

    <div id="dock">
        <button id="mic" class="btn" onclick="startVoice(event)">🎤</button>
        <input type="text" id="tin" placeholder="Command me..." autocomplete="off">
        <button class="btn" onclick="run()">🔥</button>
    </div>

    <script>
        let live = false;
        let vault = [];
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Speech ? new Speech() : null;

        if(rec) {
            rec.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('tin').value = txt;
                document.getElementById('mic').classList.remove('active');
                run();
            };
            rec.onend = () => document.getElementById('mic').classList.remove('active');
        }

        function startVoice(e) {
            e.stopPropagation();
            if(!rec) return alert("Browser hates voice.");
            document.getElementById('mic').classList.add('active');
            rec.start();
        }

        function boot() { if(!live) { live = true; speak("Systems live."); } }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-IE'; s.pitch = 1.4;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = 'ai'; d.innerText = t;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        function run() {
            const i = document.getElementById('tin');
            const v = i.value.trim().toLowerCase();
            if(!v) return;
            i.value = '';

            if(v.includes("bok radio")) {
                let m = "Putting the Bok on. Don't drive like a poes. (giggle)";
                addMsg(m); speak(m);
                setTimeout(() => { window.location.href = "https://www.bokradio.co.za/player"; }, 2000);
            } 
            else if(v.includes("navigate") || v.includes("directions")) {
                let d = v.replace("navigate to ", "").replace("directions to ", "");
                addMsg("Setting course for " + d); speak("On it, handsome.");
                setTimeout(() => { window.location.href = "google.navigation:q=" + encodeURIComponent(d); }, 2000);
            }
            else {
                // Actual Vaulting logic
                vault.push(v);
                document.getElementById('vault-content').innerText = vault.join(" | ");
                let m = "Noted. Vault updated, hotstuff. (giggle)";
                addMsg(m); speak(m);
            }
        }
        document.getElementById('tin').addEventListener('keypress', (e) => { if(e.key === 'Enter') run(); });
    </script>
</body>
</html>
