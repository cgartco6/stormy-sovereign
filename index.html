<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stormy | Sovereign OS</title>
    <style>
        :root { --accent: #00f2ff; --glass: rgba(10, 10, 10, 0.95); }
        body, html { width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        #bg { position: fixed; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3); z-index: -1; }
        #chat { height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-top: 60px; padding-bottom: 80px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px; border-radius: 22px; background: var(--glass); border: 1px solid rgba(0,242,255,0.1); font-size: 1rem; line-height: 1.4; }
        .user-msg { align-self: flex-end; border-color: rgba(255,255,255,0.2); }
        #input-area { position: fixed; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 40px; backdrop-filter: blur(10px); }
        input { flex-grow: 1; background: transparent; border: none; padding: 10px 15px; color: white; outline: none; }
        .btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        #status { position: fixed; top: 20px; right: 20px; font-size: 0.6rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <img id="bg" src="./assets/bg-1.jpg">
    <div id="status">SIGNAL: READY</div>
    <div id="chat"><div id="messages"></div></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type here...">
        <button class="btn" onclick="handleSend()">🚀</button>
    </div>

    <script>
        const msgs = document.getElementById('messages');
        const status = document.getElementById('status');
        
        // --- FORCE KEY ON LOAD ---
        let key = localStorage.getItem('GROQ_KEY');
        if (!key || key.length < 10) {
            key = prompt("Stormy needs her power source. Paste your Groq Key:");
            if (key) localStorage.setItem('GROQ_KEY', key);
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}-msg`;
            d.innerText = t;
            msgs.appendChild(d);
            msgs.scrollTop = msgs.scrollHeight;
            if(s === 'stormy') speak(t);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-ZA'; s.rate = 1.1;
            window.speechSynthesis.speak(s);
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val || !key) return;

            addMsg(val, 'user');
            input.value = '';
            status.innerText = "SIGNAL: PROCESSING...";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${key.trim()}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [
                            {role: "system", content: "You are Stormy, a sassy South African AI. It is April 8, 2026. Be direct and witty."},
                            {role: "user", content: val}
                        ]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                status.innerText = "SIGNAL: CLEAR";
                addMsg(data.choices[0].message.content, 'stormy');
            } catch (e) {
                status.innerText = "SIGNAL: FAILED";
                addMsg("Signal's dead, King. Key might be junk. Tap to reset.", 'stormy');
                // If it fails, let user click message to reset key
                document.querySelector('.stormy-msg').onclick = () => {
                    localStorage.removeItem('GROQ_KEY');
                    location.reload();
                };
            }
        }

        // Initialize with a giggle
        setTimeout(() => addMsg("I'm awake. Don't leave me hanging. (giggle)", "stormy"), 1000);
    </script>
</body>
</html>
