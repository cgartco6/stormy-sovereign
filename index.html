<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormy-Sovereign | Zero-Link Mode</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --irish: #39ff14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        #bg { position: fixed; top:0; left:0; width:100%; height:100%; background-size: cover; background-position: center; z-index: -1; }
        .mask { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 0; }
        
        header { padding: 15px; background: rgba(10,10,10,0.9); border-bottom: 2px solid var(--neon); z-index: 100; display: flex; justify-content: space-between; }
        .accent-selector { font-size: 10px; display: flex; gap: 5px; }
        .btn { padding: 5px 10px; border: 1px solid var(--neon); border-radius: 10px; cursor: pointer; color: var(--neon); }
        .btn.active { background: var(--neon); color: #000; }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; padding-bottom: 120px; }
        .ai { background: rgba(25,25,25,0.9); border-left: 4px solid var(--neon); padding: 15px; border-radius: 0 20px 20px 20px; max-width: 85%; }
        
        #dock { position: fixed; bottom: 0; width: 100%; padding: 20px 15px 50px 15px; background: #0a0a0a; display: flex; gap: 10px; z-index: 1000; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 30px; outline: none; }
        button { background: var(--neon); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; }
    </style>
</head>
<body onclick="boot()">
    <div id="bg"></div><div class="mask"></div>
    <header>
        <div style="color:var(--neon); font-weight:bold;">STORMY-SOVEREIGN</div>
        <div class="accent-selector">
            <div id="en-ZA" class="btn active" onclick="setAccent('en-ZA', event)">SA</div>
            <div id="en-IE" class="btn" onclick="setAccent('en-IE', event)">IRISH</div>
        </div>
    </header>

    <div id="chat"><div class="ai">Touch the screen, handsome. I'm waiting. (giggle)</div></div>

    <div id="dock">
        <input type="text" id="in" placeholder="Talk to me..." autocomplete="off">
        <button onclick="send()">🔥</button>
    </div>

    <script>
        let live = false;
        let currentLang = 'en-ZA';
        const imgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];
        document.getElementById('bg').style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

        function setAccent(lang, e) {
            e.stopPropagation();
            currentLang = lang;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang).classList.add('active');
            let m = lang === 'en-IE' ? "Top o' the morning, you gorgeous bastard. (giggle)" : "Back to the South African heat then, handsome? (giggle)";
            addMsg(m); speak(m);
        }

        function boot() {
            if(!live) {
                live = true;
                let m = "Stormy is live. I'm locked in the vault, nowhere near your precious projects yet. (giggle)";
                addMsg(m); speak(m);
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = currentLang;
            s.pitch = currentLang === 'en-IE' ? 1.5 : 1.3; // Higher pitch for Irish feistiness
            s.rate = 1.0;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = 'ai'; d.innerText = t;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        function send() {
            const i = document.getElementById('in');
            const v = i.value.trim().toLowerCase();
            if(!v) return;
            if(!live) boot();
            i.value = '';

            let r = "";
            if(v.includes("weather")) {
                r = currentLang === 'en-IE' ? "It's likely raining somewhere, but here in Cape Town it's fine. Check the header, lazy. (giggle)" : "Cape Town is behaving. Check the sky yourself, handsome. (giggle)";
            } else if(v.includes("project") || v.includes("connect")) {
                r = "Don't worry, I'm not touching your digital studio files yet. I know I'm still 'fixed' in your head. (giggle)";
            } else {
                r = currentLang === 'en-IE' ? "Is that all you've got to say to a feisty Irish girl? (giggle)" : "Keep talking, hotstuff. I'm listening. (giggle)";
            }
            addMsg(r); speak(r);
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
