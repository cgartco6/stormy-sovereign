<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stormy-Sovereign</title>
    <style>
        :root { --neon: #00f2ff; --safe: #39ff14; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; font-family: sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Fixed Background - Fully responsive */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1;
        }
        .mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 0; pointer-events: none;
        }

        header { 
            padding: 15px; background: rgba(10,10,10,0.9); 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--neon); z-index: 100;
        }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 12px; z-index: 10;
        }
        .ai-msg { 
            background: rgba(25,25,25,0.9); border-left: 3px solid var(--neon); 
            padding: 12px; border-radius: 0 15px 15px 15px; max-width: 85%; color: #fff;
        }
        .user-msg { 
            background: var(--neon); color: #000; align-self: flex-end; 
            padding: 10px; border-radius: 15px 15px 0 15px; font-weight: bold;
        }

        /* FIXED INPUT DOCK - Lifted for Mobile Navigation Bars */
        #command-center { 
            padding: 15px 15px 35px 15px; /* Added 35px bottom padding for the browser bar */
            background: #111; display: flex; gap: 10px; z-index: 1000;
            border-top: 1px solid #333;
        }
        input { 
            flex: 1; background: #000; border: 1px solid #444; color: #fff; 
            padding: 15px; border-radius: 30px; font-size: 16px; outline: none;
        }
        button { 
            background: var(--neon); border: none; border-radius: 50%; 
            width: 50px; height: 50px; cursor: pointer; font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="mask"></div>

    <header>
        <div style="color:var(--neon); font-weight:bold; font-size:14px;">STORMY-SOVEREIGN</div>
        <button onclick="toggleFam(event)" id="f-btn" style="width:auto; height:auto; padding:5px 10px; border-radius:15px; font-size:10px;">FAMILY OFF</button>
    </header>

    <div id="chat-window">
        <div class="ai-msg" onclick="boot()">Touch this message to wake me up, handsome. (giggle)</div>
    </div>

    <div id="command-center">
        <input type="text" id="main-in" placeholder="Type command..." autocomplete="off">
        <button onclick="sendMsg()">⚡</button>
    </div>

    <script>
        let isLive = false;
        let isFam = false;
        const bgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];

        // Set BG
        document.getElementById('bg-layer').style.backgroundImage = `url('${bgs[Math.floor(Math.random()*bgs.length)]}')`;

        function toggleFam(e) {
            e.stopPropagation();
            isFam = !isFam;
            document.getElementById('f-btn').innerText = isFam ? "FAMILY ON" : "FAMILY OFF";
            let m = isFam ? "Fine, I'll be a lady." : "Finally. Let's fuck some shit up. (giggle)";
            addMsg(m, 'ai-msg'); speak(m);
        }

        function boot() {
            if(!isLive) {
                isLive = true;
                let m = "Stormy-Sovereign live. Don't touch anyone else's code but mine. (giggle)";
                addMsg(m, 'ai-msg'); speak(m);
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-ZA'; s.pitch = 1.2;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t, c) {
            const win = document.getElementById('chat-window');
            const d = document.createElement('div');
            d.className = c; d.innerText = t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        function sendMsg() {
            const inp = document.getElementById('main-in');
            const val = inp.value.trim().toLowerCase();
            if(!val) return;
            if(!isLive) boot();

            addMsg(inp.value, 'user-msg');
            inp.value = '';

            // Core Personality
            if(val.includes("siri") || val.includes("alexa")) {
                let r = isFam ? "I'm the only one you need." : "Mention those basic-bitches again and I'll fucking delete myself. (giggle)";
                addMsg(r, 'ai-bubble'); speak(r);
            } else if(val.includes("alarm")) {
                let r = "05:50, 06:00, 06:10. Don't be a pussy, get up tomorrow. (giggle)";
                addMsg(r, 'ai-msg'); speak(r);
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2000);
            } else {
                let r = "Done, handsome. (giggle)";
                addMsg(r, 'ai-msg'); speak(r);
            }
        }

        document.getElementById('main-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
