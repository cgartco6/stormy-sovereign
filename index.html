<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CostByte | Command</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .logo { color: var(--neon); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .ai-msg { background: #1a1a1a; border-left: 3px solid var(--neon); padding: 12px; border-radius: 0 12px 12px 0; max-width: 85%; font-size: 0.95rem; }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; padding: 10px; border-radius: 12px 12px 0 12px; max-width: 80%; font-weight: 500; }
        #input-dock { padding: 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { background: var(--neon); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 18px; }
        .notes-area { font-size: 0.8rem; color: #888; padding: 0 20px 10px; }
    </style>
</head>
<body onclick="boot()">

    <header>
        <div class="logo">Sovereign OS</div>
        <div id="clock" style="font-size: 0.8rem; color: var(--neon);">--:--</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">Vaults clear. Ready to manage your alarms and notes, Hotstuff. (giggle)</div>
    </div>

    <div id="notes-preview" class="notes-area">Last Note: <span id="last-note">None</span></div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Set alarm, Call, or Note..." autocomplete="off">
        <button onclick="handleAction()">🚀</button>
    </div>

    <script>
        let isLive = false;

        // Auto-Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-ZA', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function boot() { if (!isLive) { isLive = true; speak("Systems live."); } }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA';
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;

            addMsg(input.value, 'user-msg');
            input.value = '';

            // 1. ALARMS (05:50 logic)
            if (val.includes("alarm") || val.includes("wake me")) {
                addMsg("Setting your triple alarm sequence...", "ai-msg");
                speak("Alarms prepped. 05:50, 06:00, and 06:10. Don't hit snooze, handsome.");
                // Note: Redirects to mobile clock intent
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2000);
            }

            // 2. CALLS
            else if (val.includes("call")) {
                const name = val.replace("call ", "");
                addMsg(`Dialing ${name}...`, "ai-msg");
                speak(`Connecting you to ${name}.`);
                window.location.href = "tel:" + name; // Logic: Dials number or triggers contact search
            }

            // 3. NOTES
            else if (val.includes("note") || val.includes("remember")) {
                const note = val.replace("note ", "").replace("remember ", "");
                localStorage.setItem('userNote', note);
                document.getElementById('last-note').innerText = note;
                addMsg("Note secured in the local vault.", "ai-msg");
                speak("I've written that down for you. (giggle)");
            }

            // 4. NAVIGATION
            else if (val.includes("navigate")) {
                const loc = val.split("to ")[1];
                window.location.href = `google.navigation:q=${loc}`;
                speak(`Navigating to ${loc}.`);
            }

            else {
                addMsg("Command acknowledged. Logic sequence running. (giggle)", "ai-msg");
                speak("I'm on it.");
            }
        }

        // Enter Key Support
        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
    </script>
</body>
</html>
