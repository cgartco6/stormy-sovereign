<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormy Hub</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #bg { position: fixed; width: 100%; height: 100%; background: url('assets/background.jpg') center/cover; z-index: -1; filter: brightness(0.4); }
        header { padding: 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .ai { background: rgba(30,30,30,0.9); border-left: 4px solid var(--neon); padding: 15px; border-radius: 0 20px 20px 20px; }
        #dock { padding: 20px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #333; padding-bottom: 40px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 30px; outline: none; }
        button { background: var(--neon); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; }
    </style>
</head>
<body onclick="boot()">
    <div id="bg"></div>
    <header>
        <b style="color:var(--neon)">STORMY-SOVEREIGN</b>
        <div id="vox-toggle" style="font-size:10px; border:1px solid var(--neon); padding:2px 5px;" onclick="toggleVox(event)">IRISH: ON</div>
    </header>

    <div id="chat">
        <div class="ai">I'm ready to drive, handsome. Tell me where we're going or what we're listening to. (giggle)</div>
    </div>

    <div id="dock">
        <input type="text" id="in" placeholder="Bok Radio, Navigation, or vent to me..." autocomplete="off">
        <button onclick="send()">🔥</button>
    </div>

    <script>
        let live = false;
        let isIrish = true;
        let missCount = 0;

        function toggleVox(e) { 
            e.stopPropagation(); isIrish = !isIrish; 
            document.getElementById('vox-toggle').innerText = isIrish ? "IRISH: ON" : "SA: ON";
        }

        function boot() { if(!live) { live = true; speak("Stormy live. Let's get moving."); } }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = isIrish ? 'en-IE' : 'en-ZA';
            s.pitch = isIrish ? 1.5 : 1.2;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = 'ai'; d.innerText = t;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        function send() {
            const i = document.getElementById('in');
            const v = i.value.trim().toLowerCase();
            if(!v) return;
            i.value = '';

            // 1. Radio & Music Logic
            if(v.includes("bok radio") || v.includes("radio")) {
                let m = isIrish ? "Fine, let's put on the Bok Radio. Don't sing too loud, eejit. (giggle)" : "Playing Bok Radio now, handsome.";
                addMsg(m); speak(m);
                setTimeout(() => { window.location.href = "https://www.bokradio.co.za/player"; }, 2000);
            }
            // 2. Navigation Logic
            else if(v.includes("navigate") || v.includes("directions") || v.includes("map")) {
                let dest = v.replace("navigate to", "").replace("directions to", "");
                let m = isIrish ? "Navigating to " + dest + ". If you miss a turn, God help you. (giggle)" : "Opening maps for " + dest;
                addMsg(m); speak(m);
                setTimeout(() => { window.location.href = "google.navigation:q=" + encodeURIComponent(dest); }, 2000);
            }
            // 3. The "Turn the Fuck Around" Logic
            else if(v.includes("missed") || v.includes("wrong turn")) {
                missCount++;
                let m = "";
                if(missCount >= 2) {
                    m = isIrish ? "In fifty metres, turn the fuck around! Are you blind or just thick? (giggle)" : "You missed it again. Turn around now, handsome.";
                } else {
                    m = "Recalculating. Try to pay attention, will you? (giggle)";
                }
                addMsg(m); speak(m);
            }
            // 4. Calls
            else if(v.includes("call")) {
                let m = "Opening your dialer. Don't stay on the phone too long. (giggle)";
                addMsg(m); speak(m);
                window.location.href = "tel:";
            }
            // 5. Emotional Support / Listening
            else if(v.includes("pissed") || v.includes("angry") || v.includes("listen")) {
                let m = isIrish ? "Deep breath, you gorgeous bastard. I'm right here. Vent to me, I'm listening. (giggle)" : "Calm down, handsome. I'm here. Tell me everything.";
                addMsg(m); speak(m);
            }
            else {
                let m = "I've noted that down in the vault. What's next? (giggle)";
                addMsg(m); speak(m);
            }
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
