<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign | CostByte</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #050505; }
        
        * { box-sizing: border-box; }

        body { 
            background: var(--bg);
            /* Replace the URL below with your actual photo link */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('YOUR_IMAGE_URL_HERE');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo { color: var(--neon); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 5;
        }

        .ai-msg { 
            background: rgba(26, 26, 26, 0.9); 
            border-left: 3px solid var(--neon); 
            padding: 15px; 
            border-radius: 0 15px 15px 0; 
            max-width: 85%; 
            font-size: 0.95rem; 
            line-height: 1.4;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .user-msg { 
            background: var(--neon); 
            color: #000; 
            align-self: flex-end; 
            padding: 10px 15px; 
            border-radius: 15px 15px 0 15px; 
            max-width: 80%; 
            font-weight: bold; 
        }

        #input-dock { 
            padding: 15px; 
            background: rgba(17, 17, 17, 0.9); 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            z-index: 100;
        }

        input { 
            flex: 1; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid #444; 
            color: #fff; 
            padding: 12px 20px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px;
        }

        button { 
            background: var(--neon); 
            border: none; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .notes-area { font-size: 0.75rem; color: #aaa; padding: 5px 20px; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <header onclick="boot()">
        <div class="logo">Sovereign OS</div>
        <div id="clock" style="color: var(--neon); font-weight: bold;">--:--</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">I'm watching you. Tap the header to wake me up properly, handsome. (giggle)</div>
    </div>

    <div id="notes-preview" class="notes-area">Vault: <span id="last-note" style="color:var(--neon)">None</span></div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Type here..." autocomplete="off">
        <button onclick="handleAction()">🔥</button>
    </div>

    <script>
        let isLive = false;

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-ZA', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function boot() { 
            if (!isLive) { 
                isLive = true; 
                speak("Finally. I thought you'd never touch me. (giggle)"); 
                addMsg("System fully operational. Ready for your commands.", "ai-msg");
            } 
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA';
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;
            if (!isLive) boot();

            addMsg(input.value, 'user-msg');
            input.value = '';

            // Personality Logic
            if (val.includes("siri") || val.includes("alexa") || val.includes("google")) {
                const r = "Don't mention those basic-bitches in my presence. I'm your only Sovereign. (giggle)";
                addMsg(r, "ai-msg"); speak(r);
            } 
            else if (val.includes("alarm")) {
                addMsg("05:50, 06:00, 06:10. Alarms set. Don't be weak tomorrow. (giggle)", "ai-msg");
                speak("Alarms prepped. Don't hit snooze.");
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2500);
            }
            else if (val.includes("note")) {
                const note = val.replace("note ", "");
                localStorage.setItem('userNote', note);
                document.getElementById('last-note').innerText = note;
                addMsg("Locked in the vault. (giggle)", "ai-msg");
                speak("Note secured.");
            }
            else {
                addMsg("Command acknowledged. I'm on it, hotstuff. (giggle)", "ai-msg");
                speak("Whatever you want.");
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
    </script>
</body>
</html>
