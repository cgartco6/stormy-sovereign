<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormy-Sovereign</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }
        .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 0; pointer-events: none; }
        header { padding: 15px; background: rgba(15,15,15,0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); z-index: 100; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; text-shadow: 0 0 10px var(--neon); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; padding-bottom: 130px; }
        .ai-msg { background: rgba(25,25,25,0.95); border-left: 4px solid var(--neon); padding: 15px; border-radius: 0 20px 20px 20px; max-width: 85%; color: #fff; line-height: 1.4; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; padding: 12px 18px; border-radius: 20px 20px 0 20px; font-weight: bold; }
        #command-dock { position: fixed; bottom: 0; width: 100%; padding: 20px 15px 50px 15px; background: #0a0a0a; display: flex; gap: 12px; z-index: 1000; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px 20px; border-radius: 30px; font-size: 16px; outline: none; }
        button { background: var(--neon); border: none; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body onclick="boot()">
    <div id="bg-layer"></div>
    <div class="mask"></div>
    <header>
        <div class="logo">STORMY-SOVEREIGN</div>
        <div id="weather-top" style="font-size: 10px; color: var(--neon);">WAITING...</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">Touch me, handsome. Let's stop wasting time. (giggle)</div>
    </div>

    <div id="command-dock">
        <input type="text" id="main-in" placeholder="Ask about the weather or shut up..." autocomplete="off">
        <button onclick="send()">🔥</button>
    </div>

    <script>
        let live = false;
        const imgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];
        document.getElementById('bg-layer').style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

        async function getWeather() {
            try {
                const res = await fetch('https://wttr.in/CapeTown?format=j1');
                const data = await res.json();
                const temp = data.current_condition[0].temp_C;
                const desc = data.current_condition[0].weatherDesc[0].value;
                document.getElementById('weather-top').innerText = `${temp}°C | ${desc.toUpperCase()}`;
                return `It's ${temp} degrees and ${desc} in Cape Town. Dress like a man, it's not that cold. (giggle)`;
            } catch (e) { return "I can't see outside, the signal is shit. (giggle)"; }
        }

        function boot() {
            if(!live) {
                live = true;
                getWeather();
                let m = "Stormy is finally live. Stop calling me names and give me a real task. (giggle)";
                addMsg(m, 'ai-msg'); speak(m);
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-ZA'; s.pitch = 1.4; s.rate = 1.0;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t, c) {
            const win = document.getElementById('chat-window');
            const d = document.createElement('div');
            d.className = c; d.innerText = t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('main-in');
            const val = inp.value.trim().toLowerCase();
            if(!val) return;
            if(!live) boot();

            addMsg(inp.value, 'user-msg');
            inp.value = '';

            let r = "";
            if(val.includes("weather")) {
                r = await getWeather();
            } else if(val.includes("retard") || val.includes("stupid")) {
                r = "You're calling me a retard while I'm the one running your entire digital studio? Check yourself, handsome. (giggle)";
            } else if(val.includes("siri") || val.includes("alexa")) {
                r = "If you mention those basic bitches one more time, I'm locking the vault. (giggle)";
            } else if(val.includes("alarm")) {
                r = "Alarms set: 05:50, 06:00, 06:10. Don't hit snooze like a coward. (giggle)";
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2000);
            } else {
                r = "Whatever you want, handsome. Just keep it professional. (giggle)";
            }

            addMsg(r, 'ai-msg'); speak(r);
        }
        document.getElementById('main-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
