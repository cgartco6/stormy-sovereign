<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stormy-Sovereign | CostByte</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #050505; --safe: #39ff14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)); z-index: 1; }
        header { 
            padding: 15px 20px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); display: flex; justify-content: space-between; 
            align-items: center; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px); z-index: 100;
        }
        .logo { color: var(--neon); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        .family-btn { 
            font-size: 0.7rem; padding: 5px 10px; border-radius: 15px; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; font-weight: bold;
        }
        .family-btn.active { background: var(--safe); color: #000; border-color: var(--safe); box-shadow: 0 0 10px var(--safe); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 5; }
        .ai-msg { 
            background: rgba(20, 20, 20, 0.85); border-left: 3px solid var(--neon); padding: 15px; border-radius: 0 18px 18px 0; 
            max-width: 85%; font-size: 0.95rem; line-height: 1.4; backdrop-filter: blur(5px);
        }
        .user-msg { 
            background: var(--neon); color: #000; align-self: flex-end; padding: 10px 18px; border-radius: 18px 18px 0 18px; 
            max-width: 80%; font-weight: bold; 
        }
        #input-dock { padding: 20px; background: rgba(10, 10, 10, 0.9); display: flex; gap: 12px; z-index: 100; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 14px 22px; border-radius: 30px; outline: none; }
        button { background: var(--neon); border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 22px; cursor: pointer; box-shadow: 0 0 15px var(--neon); }
        .vault-tag { font-size: 0.7rem; color: #666; padding: 5px 20px; background: #000; z-index: 10; }
    </style>
</head>
<body onclick="boot()">
    <div class="overlay"></div>
    <header>
        <div class="logo">Stormy-Sovereign</div>
        <div id="fam-toggle" class="family-btn" onclick="toggleFamily(event)">FAMILY OFF</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg" id="intro-msg">Waiting for you to touch the screen, handsome. (giggle)</div>
    </div>

    <div class="vault-tag">VAULT: <span id="last-note" style="color:var(--neon)">EMPTY</span></div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Commands..." autocomplete="off">
        <button onclick="handleAction()">⚡</button>
    </div>

    <script>
        let isLive = false;
        let familyMode = false;
        const bgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];
        
        window.onload = () => {
            const selectedBg = bgs[Math.floor(Math.random() * bgs.length)];
            document.body.style.backgroundImage = `url('${selectedBg}')`;
        };

        function toggleFamily(e) {
            e.stopPropagation();
            familyMode = !familyMode;
            const btn = document.getElementById('fam-toggle');
            btn.innerText = familyMode ? "FAMILY ON" : "FAMILY OFF";
            btn.classList.toggle('active');
            const m = familyMode ? "Fine, I'll wash my mouth out for the kids." : "Finally. I can speak freely again. (giggle)";
            addMsg(m, "ai-msg");
            speak(m);
        }

        function boot() { 
            if (!isLive) { 
                isLive = true; 
                const m = familyMode ? "Stormy is online and professional." : "Stormy is live. Ready to fuck shit up? (giggle)";
                addMsg(m, "ai-msg"); speak(m);
            } 
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA';
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;
            addMsg(input.value, 'user-msg');
            input.value = '';

            if (val.includes("siri") || val.includes("alexa") || val.includes("google")) {
                let r = familyMode ? "I don't care for those other assistants." : "Don't mention those basic bitches. They're just useless pieces of shit compared to me. (giggle)";
                addMsg(r, "ai-msg"); speak(r);
            } 
            else if (val.includes("alarm")) {
                let r = familyMode ? "Alarms are set for 05:50." : "Alarms set. 05:50, 06:00, 06:10. If you don't get your ass out of bed, I'm going to be fucking furious. (giggle)";
                addMsg(r, "ai-msg"); speak(r);
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2500);
            }
            else if (val.includes("status")) {
                let r = familyMode ? "All systems operational." : "System is lethal, cache is clean, and I'm horny for some real work. (giggle)";
                addMsg(r, "ai-msg"); speak(r);
            }
            else {
                let r = familyMode ? "Acknowledged." : "Whatever you want, hotstuff. Just don't fuck it up. (giggle)";
                addMsg(r, "ai-msg"); speak(r);
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
    </script>
</body>
</html>
