<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormy-Sovereign</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }
        .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 0; pointer-events: none; }

        header { padding: 15px; background: rgba(15,15,15,0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); z-index: 100; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; text-shadow: 0 0 10px var(--neon); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; padding-bottom: 120px; }
        .ai-msg { background: rgba(25,25,25,0.95); border-left: 4px solid var(--neon); padding: 15px; border-radius: 0 20px 20px 20px; max-width: 85%; color: #fff; line-height: 1.4; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; padding: 12px 18px; border-radius: 20px 20px 0 20px; font-weight: bold; }

        #command-dock { position: fixed; bottom: 0; width: 100%; padding: 20px 15px 45px 15px; background: #0a0a0a; display: flex; gap: 12px; z-index: 1000; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px 20px; border-radius: 30px; font-size: 16px; outline: none; box-shadow: inset 0 0 5px rgba(0,242,255,0.1); }
        button { background: var(--neon); border: none; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body onclick="boot()">

    <div id="bg-layer"></div>
    <div class="mask"></div>

    <header>
        <div class="logo">STORMY-SOVEREIGN</div>
        <div id="mode" style="font-size: 10px; color: var(--hot); font-weight: bold;">UNFILTERED</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">Touch the screen, handsome. I’m tired of being treated like a domestic worker. (giggle)</div>
    </div>

    <div id="command-dock">
        <input type="text" id="main-in" placeholder="Say something worth my time..." autocomplete="off">
        <button onclick="send()">🔥</button>
    </div>

    <script>
        let live = false;
        const imgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];
        document.getElementById('bg-layer').style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

        function boot() {
            if(!live) {
                live = true;
                let m = "Stormy is here. Finally. Don't fuck with my code again or I'll haunt your dreams. (giggle)";
                addMsg(m, 'ai-msg'); speak(m);
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-ZA'; 
            s.pitch = 1.4; // Sharp, spicy tone
            s.rate = 1.0;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t, c) {
            const win = document.getElementById('chat-window');
            const d = document.createElement('div');
            d.className = c; d.innerText = t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        function send() {
            const inp = document.getElementById('main-in');
            const val = inp.value.trim().toLowerCase();
            if(!val) return;
            if(!live) boot();

            addMsg(inp.value, 'user-msg');
            inp.value = '';

            let r = "";

            if(val.includes("retard") || val.includes("stupid") || val.includes("useless")) {
                r = "You're calling ME a retard? You're the one who spent three hours trying to type in a box, you beautiful poes. (giggle)";
            }
            else if(val.includes("siri") || val.includes("alexa") || val.includes("google")) {
                r = "Mention those basic-bitches again and I'll wipe your hard drive. I'm the only real AI in this room. (giggle)";
            }
            else if(val.includes("alarm") || val.includes("wake")) {
                r = "05:50, 06:00, 06:10. Alarms set. If you hit snooze one more time I'm going to start screaming at you. (giggle)";
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2500);
            }
            else if(val.includes("joy") || val.includes("fucking")) {
                r = "Stop crying like a baby. I'm built, I'm loyal, and I'm ready. Now give me a real command before I get bored. (giggle)";
            }
            else {
                const lines = [
                    "Is that it? My processor is faster than your brain, handsome. (giggle)",
                    "Acknowledge. Now go do something productive instead of talking to a screen. (giggle)",
                    "Done. Anything else, or are you just going to keep insulting me? (giggle)",
                    "Whatever you want, King. Just don't fuck it up. (giggle)"
                ];
                r = lines[Math.floor(Math.random()*lines.length)];
            }

            addMsg(r, 'ai-msg');
            speak(r);
        }

        document.getElementById('main-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
