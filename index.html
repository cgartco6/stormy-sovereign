<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stormy | Sovereign</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #bg { position: fixed; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3); z-index: -1; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; border: 1px solid #00f2ff; max-width: 80%; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #111; border: 1px solid #00f2ff; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #00f2ff; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; }
    </style>
</head>
<body onload="checkPower()">
    <img id="bg" src="./assets/bg-1.jpg">
    <div id="chat" id="msgs"></div>
    <div id="input-area">
        <input type="text" id="ui" placeholder="Signal clear...">
        <button onclick="send()">🚀</button>
    </div>
    <script>
        let key = localStorage.getItem('XAI_KEY');
        function checkPower() {
            if (!key) {
                key = prompt("Stormy needs her Grok Key to wake up:");
                if (key) localStorage.setItem('XAI_KEY', key);
            }
            addMsg("Engine Active. Signal clear. (giggle)", "stormy");
        }
        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = 'msg'; d.innerText = t;
            document.getElementById('chat').appendChild(d);
            if(s === 'stormy') {
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));
            }
        }
        async function send() {
            const val = document.getElementById('ui').value;
            if(!val || !key) return;
            addMsg(val, "user");
            document.getElementById('ui').value = '';
            try {
                const res = await fetch("https://api.x.ai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "grok-beta", messages: [{role: "system", content: "You are Stormy, a sassy South African AI. It's April 8, 2026."}, {role: "user", content: val}] })
                });
                const data = await res.json();
                addMsg(data.choices[0].message.content, "stormy");
            } catch (e) { addMsg("Key rejected. Clear your data and try again.", "stormy"); }
        }
    </script>
</body>
</html>
