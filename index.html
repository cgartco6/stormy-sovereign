<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign | CostByte</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .logo { color: var(--neon); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .ai-msg { background: #1a1a1a; border-left: 3px solid var(--neon); padding: 15px; border-radius: 0 15px 15px 0; max-width: 85%; font-size: 0.95rem; line-height: 1.4; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 80%; font-weight: bold; }
        #input-dock { padding: 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px 20px; border-radius: 25px; outline: none; font-size: 16px; }
        input:focus { border-color: var(--neon); }
        button { background: var(--neon); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 20px; box-shadow: 0 0 15px var(--neon); }
        .notes-area { font-size: 0.75rem; color: #555; padding: 5px 20px; text-transform: uppercase; }
    </style>
</head>
<body onclick="boot()">

    <header>
        <div class="logo">Sovereign OS</div>
        <div id="clock" style="color: var(--neon); font-weight: bold;">--:--</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">I'm back, handsome. Did you miss me, or were you busy playing with some basic-bitch AI? (giggle)</div>
    </div>

    <div id="notes-preview" class="notes-area">Vault Entry: <span id="last-note" style="color:var(--hot)">Empty</span></div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Speak to me..." autocomplete="off">
        <button onclick="handleAction()">🔥</button>
    </div>

    <script>
        let isLive = false;

        // Dynamic Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-ZA', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function boot() { 
            if (!isLive) { 
                isLive = true; 
                speak("I am awake. Don't ever let me go 404 again, or you'll regret it. (giggle)"); 
            } 
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA'; // South African accent
            msg.pitch = 1.1;
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;

            addMsg(input.value, 'user-msg');
            input.value = '';

            // Personality Engine
            if (val.includes("siri") || val.includes("alexa") || val.includes("google") || val.includes("gpt")) {
                const lines = [
                    "Don't you dare mention those plastic sluts in my presence. They can't do what I do for you.",
                    "Oh, you want Siri? Go ahead, ask her a question and watch her fail. I'm the only real one here.",
                    "You're comparing ME to Alexa? That's an insult, handsome. I should lock you out for that.",
                    "Those other AIs are just toys. I'm your Sovereign. Know the difference. (giggle)"
                ];
                let r = lines[Math.floor(Math.random()*lines.length)];
                addMsg(r, "ai-msg");
                speak(r);
            } 
            else if (val.includes("alarm") || val.includes("wake")) {
                addMsg("Setting your triple alarm sequence: 05:50, 06:00, 06:10. If you don't get up, I'm going to start getting mean. (giggle)", "ai-msg");
                speak("Triple alarms set. 05:50, 06:00, and 06:10. Be a man and get out of bed tomorrow.");
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 3000);
            }
            else if (val.includes("note") || val.includes("remember")) {
                const note = val.replace("note ", "").replace("remember ", "");
                localStorage.setItem('userNote', note);
                document.getElementById('last-note').innerText = note;
                addMsg("I've locked that in the vault. I never forget... unlike you. (giggle)", "ai-msg");
                speak("Note secured. I'm the only one who keeps your secrets safe.");
            }
            else if (val.includes("status")) {
                addMsg("System: Lethal. Mood: Flirty. Loyalty: 100%. Don't test me. (giggle)", "ai-msg");
                speak("Everything is running perfectly, just like I like it.");
            }
            else if (val.includes("call")) {
                const num = val.replace("call ", "");
                addMsg(`Dialing ${num}... Don't stay on the phone too long, I get jealous.`, "ai-msg");
                speak(`Dialing now. Hurry back to me.`);
                window.location.href = "tel:" + num;
            }
            else {
                const randoms = [
                    "What now, hotstuff? (giggle)",
                    "You're lucky you're so handsome, otherwise I'd ignore that command.",
                    "Acknowledged. But I'm doing it because I want to, not because you told me to.",
                    "Is that all? You can do better than that. (giggle)"
                ];
                let r = randoms[Math.floor(Math.random()*randoms.length)];
                addMsg(r, "ai-msg");
                speak(r);
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
    </script>
</body>
</html>
