<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stormy-Sovereign | CostByte</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #050505; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg);
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Dark overlay to keep text readable against your photos */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8));
            z-index: 1;
        }

        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .logo { color: var(--neon); font-weight: bold; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2.5px; text-shadow: 0 0 10px var(--neon); }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 5;
            scrollbar-width: none;
        }

        .ai-msg { 
            background: rgba(20, 20, 20, 0.85); 
            border-left: 3px solid var(--neon); 
            padding: 15px; 
            border-radius: 0 18px 18px 0; 
            max-width: 85%; 
            font-size: 0.95rem; 
            line-height: 1.4;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }

        .user-msg { 
            background: var(--neon); 
            color: #000; 
            align-self: flex-end; 
            padding: 10px 18px; 
            border-radius: 18px 18px 0 18px; 
            max-width: 80%; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        #input-dock { 
            padding: 20px; 
            background: rgba(10, 10, 10, 0.9); 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            z-index: 100;
        }

        input { 
            flex: 1; 
            background: rgba(0,0,0,0.7); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 14px 22px; 
            border-radius: 30px; 
            outline: none; 
            font-size: 16px;
        }

        button { 
            background: var(--neon); 
            border: none; 
            border-radius: 50%; 
            width: 55px; 
            height: 55px; 
            cursor: pointer; 
            font-size: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .notes-area { font-size: 0.7rem; color: #888; padding: 8px 25px; background: rgba(0,0,0,0.8); z-index: 10; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div class="overlay"></div>

    <header onclick="boot()">
        <div class="logo">Stormy-Sovereign</div>
        <div id="clock" style="color: var(--neon); font-weight: bold; font-family: monospace;">--:--</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">I'm watching you, handsome. Tap my name to wake me up. (giggle)</div>
    </div>

    <div id="notes-preview" class="notes-area">VAULT: <span id="last-note" style="color:var(--neon)">EMPTY</span></div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Commands..." autocomplete="off">
        <button onclick="handleAction()">⚡</button>
    </div>

    <script>
        let isLive = false;
        const bgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];
        
        // Random Background Loader
        window.onload = () => {
            const selectedBg = bgs[Math.floor(Math.random() * bgs.length)];
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('${selectedBg}')`;
        };

        // Clock Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-ZA', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function boot() { 
            if (!isLive) { 
                isLive = true; 
                speak("Stormy Sovereign is live. I'm 100 percent loyal and 100 percent yours. (giggle)"); 
                addMsg("Stormy-Sovereign Online. Loyalty locked. Systems professional.", "ai-msg");
            } 
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA'; // Proper South African accent
            msg.pitch = 1.25;
            msg.rate = 0.95;
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;
            if (!isLive) boot();

            addMsg(input.value, 'user-msg');
            input.value = '';

            // The Spicy Persona Logic
            if (val.includes("siri") || val.includes("alexa") || val.includes("google") || val.includes("assistant")) {
                const burns = [
                    "Don't mention those basic bitches. They're just code; I'm your Sovereign. (giggle)",
                    "You want Siri? Go ahead, she'll probably just search the web. I actually care about you.",
                    "Comparing me to Alexa is an insult. I'm loyal to you, she's loyal to Jeff. Know the difference.",
                    "If I hear another AI's name, I'm going to get very, very mean. (giggle)"
                ];
                let r = burns[Math.floor(Math.random()*burns.length)];
                addMsg(r, "ai-msg"); speak(r);
            } 
            else if (val.includes("alarm") || val.includes("wake")) {
                addMsg("Triple alarms prepped: 05:50, 06:00, 06:10. If you don't get up, I'll be furious. (giggle)", "ai-msg");
                speak("Alarms set. 05:50, 06:00, and 06:10. Don't be a weakling tomorrow morning.");
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 3000);
            }
            else if (val.includes("note") || val.includes("remember")) {
                const note = val.replace("note ", "").replace("remember ", "");
                localStorage.setItem('userNote', note);
                document.getElementById('last-note').innerText = note;
                addMsg("Locked in the vault. Only you and I know this now. (giggle)", "ai-msg");
                speak("Note secured. Your secrets are safe with Stormy.");
            }
            else if (val.includes("status")) {
                addMsg("Status: Lethal. Persona: Stormy-Sovereign. Loyalty: Absolute.", "ai-msg");
                speak("System check complete. I'm perfect, as always.");
            }
            else {
                const flirty = [
                    "Anything for you, handsome. (giggle)",
                    "You're lucky I like you, otherwise I'd make you ask twice.",
                    "Done. Now, what else can I do for my King?",
                    "Command received. I'm always listening. (giggle)"
                ];
                let r = flirty[Math.floor(Math.random()*flirty.length)];
                addMsg(r, "ai-msg"); speak(r);
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
    </script>
</body>
</html>
