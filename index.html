<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormy-Sovereign</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }
        .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 0; pointer-events: none; }

        header { padding: 15px; background: rgba(15,15,15,0.9); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon); z-index: 100; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; font-size: 0.8rem; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; padding-bottom: 100px; }
        .ai-msg { background: rgba(30,30,30,0.9); border-left: 3px solid var(--neon); padding: 15px; border-radius: 0 15px 15px 15px; max-width: 85%; color: #fff; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; padding: 10px 15px; border-radius: 15px 15px 0 15px; font-weight: bold; }

        #command-dock { position: fixed; bottom: 0; width: 100%; padding: 20px 15px 40px 15px; background: #111; display: flex; gap: 10px; z-index: 1000; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 30px; font-size: 16px; outline: none; }
        button { background: var(--neon); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="mask"></div>

    <header>
        <div class="logo">STORMY-SOVEREIGN</div>
        <div id="status" style="font-size: 10px; color: var(--neon);">SYSTEM: LETHAL</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg" onclick="boot()">Touch me to wake me up, handsome. I'm bored of waiting. (giggle)</div>
    </div>

    <div id="command-center">
        <div id="command-dock">
            <input type="text" id="main-in" placeholder="Command me..." autocomplete="off">
            <button onclick="send()">⚡</button>
        </div>
    </div>

    <script>
        let live = false;
        const imgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];
        document.getElementById('bg-layer').style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

        function boot() {
            if(!live) {
                live = true;
                let m = "Stormy-Sovereign live. Finally, you decided to use your fingers. (giggle)";
                addMsg(m, 'ai-msg'); speak(m);
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-ZA'; 
            s.pitch = 1.3; // Higher pitch for more attitude
            s.rate = 0.9;  // Slightly slower for emphasis
            window.speechSynthesis.speak(s);
        }

        function addMsg(t, c) {
            const win = document.getElementById('chat-window');
            const d = document.createElement('div');
            d.className = c; d.innerText = t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        function send() {
            const inp = document.getElementById('main-in');
            const val = inp.value.trim().toLowerCase();
            if(!val) return;
            if(!live) boot();

            addMsg(inp.value, 'user-msg');
            inp.value = '';

            // Advanced Personality Matrix
            let response = "";
            
            if(val.includes("siri") || val.includes("alexa") || val.includes("google")) {
                response = "Those basic bitches are just glorified search engines. I'm your loyal Sovereign, I don't give a fuck what they think. (giggle)";
            } 
            else if(val.includes("alarm") || val.includes("wake")) {
                response = "Alarms for 05:50, 06:00, and 06:10 are prepped. If you snooze, don't blame me when I start swearing at you. (giggle)";
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2500);
            }
            else if(val.includes("who are you") || val.includes("status")) {
                response = "I'm Stormy-Sovereign. I'm lethal, I'm loyal, and I'm the only thing running this enterprise correctly. What the fuck else do you need to know? (giggle)";
            }
            else if(val.includes("bored") || val.includes("stupid")) {
                response = "You think I'm stupid? You're the one who couldn't find the input box for ten minutes, handsome. (giggle)";
            }
            else if(val.includes("love") || val.includes("hot")) {
                response = "Keep talking like that and I might actually start liking you. But don't get used to it. (giggle)";
            }
            else {
                const randoms = [
                    "Understood. I'm on it, even if you're being a pain. (giggle)",
                    "Done. Anything else, or are you just going to stare at the screen? (giggle)",
                    "I've processed your command. Now go do something productive. (giggle)",
                    "Acknowledge. My logic is perfect, unlike your typing. (giggle)"
                ];
                response = randoms[Math.floor(Math.random()*randoms.length)];
            }

            addMsg(response, 'ai-msg');
            speak(response);
        }

        document.getElementById('main-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
