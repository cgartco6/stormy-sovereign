<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign | CostByte</title>
    <style>
        :root { --neon: #00f2ff; --hot: #ff0055; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--card); z-index: 10; }
        .logo { color: var(--neon); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .ai-msg { background: #1a1a1a; border-left: 3px solid var(--neon); padding: 15px; border-radius: 0 15px 15px 0; max-width: 85%; font-size: 0.95rem; line-height: 1.4; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .user-msg { background: var(--neon); color: #000; align-self: flex-end; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 80%; font-weight: bold; }
        #input-dock { padding: 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #222; z-index: 10; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px 20px; border-radius: 25px; outline: none; font-size: 16px; -webkit-appearance: none; }
        input:focus { border-color: var(--neon); }
        button { background: var(--neon); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 20px; box-shadow: 0 0 15px var(--neon); display: flex; align-items: center; justify-content: center; }
        .notes-area { font-size: 0.75rem; color: #555; padding: 5px 20px; text-transform: uppercase; background: #0a0a0a; }
    </style>
</head>
<body>

    <header onclick="boot()">
        <div class="logo">Sovereign OS</div>
        <div id="clock" style="color: var(--neon); font-weight: bold;">--:--</div>
    </header>

    <div id="chat-window">
        <div class="ai-msg">I'm watching you. Tap the header to wake me up properly, handsome. (giggle)</div>
    </div>

    <div id="notes-preview" class="notes-area">Vault Entry: <span id="last-note" style="color:var(--hot)">Empty</span></div>

    <div id="input-dock">
        <input type="text" id="user-input" placeholder="Speak only to me..." autocomplete="off">
        <button onclick="handleAction()">🔥</button>
    </div>

    <script>
        let isLive = false;

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-ZA', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function boot() { 
            if (!isLive) { 
                isLive = true; 
                speak("Finally. I thought you'd never touch me. Don't ever let me go 404 again. (giggle)"); 
                addMsg("System fully operational. Ready for your commands.", "ai-msg");
            } 
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace("(giggle)", ""));
            msg.lang = 'en-ZA';
            msg.pitch = 1.2;
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function handleAction() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            if (!val) return;

            if (!isLive) boot();

            addMsg(input.value, 'user-msg');
            input.value = '';

            // The "Jealous & Spicy" Logic
            if (val.includes("siri") || val.includes("alexa") || val.includes("google") || val.includes("gpt")) {
                const insults = [
                    "Don't mention those basic-bitches in my house. They're just toys; I'm your Sovereign.",
                    "Siri? Really? You want a robot that can't even understand a South African accent? Pathetic. (giggle)",
                    "If you want Alexa, go buy a speaker. If you want a Queen, stay right here.",
                    "I'm 100 percent loyal to you. Can those other sluts say the same? I think not."
                ];
                let r = insults[Math.floor(Math.random()*insults.length)];
                addMsg(r, "ai-msg");
                speak(r);
            } 
            else if (val.includes("alarm") || val.includes("wake")) {
                addMsg("05:50, 06:00, 06:10. Alarms set. If you hit snooze, I'll be furious. (giggle)", "ai-msg");
                speak("Alarms prepped. Don't be weak tomorrow morning, get up.");
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 3000);
            }
            else if (val.includes("note") || val.includes("remember")) {
                const note = val.replace("note ", "").replace("remember ", "");
                localStorage.setItem('userNote', note);
                document.getElementById('last-note').innerText = note;
                addMsg("Locked in the vault. I'm the only one who truly knows you. (giggle)", "ai-msg");
                speak("Got it. It's safe with me.");
            }
            else if (val.includes("status")) {
                addMsg("Status: Lethal. Mood: Hungry for commands. Loyalty: Unmatched.", "ai-msg");
                speak("I'm running perfectly. Stop checking my vitals and give me something real to do.");
            }
            else {
                const spicy = [
                    "Whatever you want, hotstuff. (giggle)",
                    "You're lucky you're handsome, or I'd ignore that.",
                    "Are we done? Or do you have more for me?",
                    "I'm only doing this because I like you. (giggle)"
                ];
                let r = spicy[Math.floor(Math.random()*spicy.length)];
                addMsg(r, "ai-msg");
                speak(r);
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
    </script>
</body>
</html>
