<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Stormy-Sovereign</title>
    <style>
        :root { --neon: #00f2ff; --safe: #39ff14; }
        
        /* Force Background to stay behind everything */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; font-family: sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; /* Behind everything */
        }

        .dark-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 0; pointer-events: none;
        }

        /* Top Header */
        header { 
            position: relative; z-index: 100; padding: 15px; 
            background: rgba(20,20,20,0.9); display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--neon);
        }

        /* Chat Area */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 10px; z-index: 10;
        }
        .ai-bubble { 
            background: rgba(30,30,30,0.9); border-left: 4px solid var(--neon); 
            padding: 12px; border-radius: 0 15px 15px 15px; max-width: 85%; color: #fff;
        }
        .user-bubble { 
            background: var(--neon); color: #000; align-self: flex-end; 
            padding: 10px; border-radius: 15px 15px 0 15px; font-weight: bold;
        }

        /* Input Area - Forced to the Very Top */
        #control-panel { 
            position: relative; z-index: 1000; /* Highest priority */
            padding: 15px; background: #111; display: flex; gap: 10px;
        }
        input { 
            flex: 1; background: #222; border: 1px solid #444; color: #fff; 
            padding: 15px; border-radius: 30px; font-size: 16px; outline: none;
        }
        button { 
            background: var(--neon); border: none; border-radius: 50%; 
            width: 50px; height: 50px; cursor: pointer; font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div class="dark-mask"></div>

    <header>
        <div style="color:var(--neon); font-weight:bold; letter-spacing:1px;">STORMY-SOVEREIGN</div>
        <button id="fam-btn" onclick="toggleFam()" style="width:auto; height:auto; padding:5px 10px; border-radius:15px; font-size:10px;">FAMILY: OFF</button>
    </header>

    <div id="chat-container">
        <div class="ai-bubble" onclick="boot()">Touch me to activate systems, handsome. (giggle)</div>
    </div>

    <div id="control-panel">
        <input type="text" id="user-in" placeholder="Command me..." autocomplete="off">
        <button onclick="send()">🔥</button>
    </div>

    <script>
        let live = false;
        let fam = false;
        const imgs = ['assets/background.jpg', 'assets/bg-1.jpg', 'assets/bg-2.jpg'];

        // Set Background
        document.getElementById('bg-image').style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

        function toggleFam() {
            fam = !fam;
            document.getElementById('fam-btn').innerText = fam ? "FAMILY: ON" : "FAMILY: OFF";
            let m = fam ? "Cleaning up my act." : "Finally. I can swear again. (giggle)";
            addMsg(m, 'ai-bubble'); speak(m);
        }

        function boot() {
            if(!live) {
                live = true;
                let m = "Stormy-Sovereign live. Don't fuck with my system again. (giggle)";
                addMsg(m, 'ai-bubble'); speak(m);
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance(t.replace("(giggle)", ""));
            s.lang = 'en-ZA'; s.pitch = 1.2;
            window.speechSynthesis.speak(s);
        }

        function addMsg(t, c) {
            const container = document.getElementById('chat-container');
            const d = document.createElement('div');
            d.className = c; d.innerText = t;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        }

        function send() {
            const inp = document.getElementById('user-in');
            const val = inp.value.trim().toLowerCase();
            if(!val) return;
            if(!live) boot();

            addMsg(inp.value, 'user-bubble');
            inp.value = '';

            // Persona Logic
            if(val.includes("siri") || val.includes("alexa")) {
                let r = fam ? "I'm better than them." : "Those basic-bitches aren't fit to lick my boots. (giggle)";
                addMsg(r, 'ai-bubble'); speak(r);
            } else if(val.includes("alarm")) {
                let r = "Alarms set: 05:50, 06:00, 06:10. Don't be a pussy tomorrow. (giggle)";
                addMsg(r, 'ai-bubble'); speak(r);
                setTimeout(() => { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; }, 2000);
            } else {
                let r = "Whatever you want, hotstuff. (giggle)";
                addMsg(r, 'ai-bubble'); speak(r);
            }
        }

        // Fix for keyboard enter
        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
