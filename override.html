<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign | Zero-Lag</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { background: rgba(20,20,20,0.9); padding: 15px; border-radius: 20px; border: 1px solid #00f2ff; max-width: 85%; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #111; }
        input { flex: 1; background: #000; border: 1px solid #00f2ff; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #00f2ff; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; }
    </style>
</head>
<body onload="boot()">
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="ui" placeholder="Direct Command...">
        <button onclick="run()">🚀</button>
    </div>
    <script>
        function boot() { add("Vaults purged. LLM bypassed. System is 100% script-responsive. (giggle)"); }
        function add(t) {
            const d = document.createElement('div'); d.className = 'msg'; d.innerText = t;
            document.getElementById('chat').appendChild(d);
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(t.replace("(giggle)", "")));
        }
        function run() {
            const v = document.getElementById('ui').value.toLowerCase();
            document.getElementById('ui').value = '';
            if (v.includes("radio")) { window.open("https://bokradio.radiostream.co.za/"); add("Bok Radio active."); }
            else if (v.includes("navigate")) { window.location.href = "google.navigation:q=" + v.split("to ")[1]; }
            else { add("System is live and ignoring the ghost. (giggle)"); }
        }
    </script>
</body>
</html>
